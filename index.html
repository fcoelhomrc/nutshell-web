<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>nutshell</title>
  <meta name="description" content="A curated collection of notes and ideas.">
  <style>
    /* ─── Rose Pine palette ─────────────────────────────────────── */
    :root {
      --bg:       #191724;
      --surface:  #1f1d2e;
      --overlay:  #26233a;
      --muted:    #6e6a86;
      --subtle:   #908caa;
      --text:     #e0def4;
      --love:     #eb6f92;
      --gold:     #f6c177;
      --rose:     #ebbcba;
      --pine:     #31748f;
      --foam:     #9ccfd8;
      --iris:     #c4a7e7;
      --border:   #393552;
      --accent:   #31748f;
      --accent-fg:#e0def4;
    }
    [data-theme="light"] {
      --bg:       #faf4ed;
      --surface:  #fffaf3;
      --overlay:  #f2e9e1;
      --muted:    #9893a5;
      --subtle:   #797593;
      --text:     #575279;
      --love:     #b4637a;
      --gold:     #ea9d34;
      --rose:     #d7827e;
      --pine:     #286983;
      --foam:     #56949f;
      --iris:     #907aa9;
      --border:   #dfdad9;
      --accent:   #286983;
      --accent-fg:#fffaf3;
    }

    /* ─── Reset & base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Inter", ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
      transition: background 0.2s, color 0.2s;
    }

    a { color: var(--foam); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ─── Header ────────────────────────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(8px);
    }
    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 1.5rem;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .site-name {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 0.45rem;
    }
    .site-name .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--iris);
      display: inline-block;
    }
    nav {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .nav-link {
      padding: 0.3rem 0.6rem;
      border-radius: 6px;
      font-size: 0.875rem;
      color: var(--subtle);
      transition: color 0.15s, background 0.15s;
    }
    .nav-link:hover {
      color: var(--text);
      background: var(--overlay);
      text-decoration: none;
    }
    .theme-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--subtle);
      cursor: pointer;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      transition: color 0.15s, background 0.15s, border-color 0.15s;
      margin-left: 0.25rem;
    }
    .theme-btn:hover {
      color: var(--text);
      background: var(--overlay);
      border-color: var(--subtle);
    }

    /* ─── Hero ──────────────────────────────────────────────────── */
    .hero {
      max-width: 1100px;
      margin: 0 auto;
      padding: 4rem 1.5rem 2.5rem;
    }
    .hero h1 {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.2;
      color: var(--text);
    }
    .hero h1 span { color: var(--iris); }
    .hero p {
      margin-top: 0.9rem;
      font-size: 1.05rem;
      color: var(--subtle);
      max-width: 520px;
    }

    /* ─── Search & filter ───────────────────────────────────────── */
    .controls {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 1.5rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
      max-width: 360px;
    }
    .search-wrap svg {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }
    #search {
      width: 100%;
      padding: 0.5rem 0.75rem 0.5rem 2.25rem;
      background: var(--overlay);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.15s;
    }
    #search::placeholder { color: var(--muted); }
    #search:focus { border-color: var(--pine); }

    .tag-filters {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }
    .tag-btn {
      padding: 0.3rem 0.75rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: none;
      color: var(--subtle);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .tag-btn:hover { border-color: var(--pine); color: var(--foam); }
    .tag-btn.active {
      background: var(--pine);
      border-color: var(--pine);
      color: var(--accent-fg);
    }

    /* ─── Cards grid ─────────────────────────────────────────────── */
    .grid {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 1.5rem 4rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.4rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }
    .card:hover {
      border-color: var(--pine);
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      text-decoration: none;
    }

    .card-type {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }
    .card-type-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--iris);
      flex-shrink: 0;
    }
    .card-type-dot.canvas  { background: var(--gold); }
    .card-type-dot.note    { background: var(--foam); }
    .card-type-dot.slides  { background: var(--rose); }

    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text);
      line-height: 1.3;
    }

    .card p {
      font-size: 0.875rem;
      color: var(--subtle);
      line-height: 1.5;
      flex: 1;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 0.4rem;
    }
    .card-tags {
      display: flex;
      gap: 0.3rem;
      flex-wrap: wrap;
    }
    .tag {
      padding: 0.15rem 0.55rem;
      border-radius: 999px;
      background: var(--overlay);
      color: var(--subtle);
      font-size: 0.72rem;
      border: 1px solid var(--border);
    }
    .card-date {
      font-size: 0.75rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem;
      color: var(--muted);
    }

    /* ─── Footer ─────────────────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--border);
      padding: 1.5rem;
      text-align: center;
      font-size: 0.8rem;
      color: var(--muted);
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <span class="site-name"><span class="dot"></span>nutshell</span>
    <nav>
      <a class="nav-link" href="https://github.com/fcoelhomrc/nutshell-web" target="_blank" rel="noopener">
        GitHub
      </a>
      <button class="theme-btn" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">
        <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             style="display:none">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
    </nav>
  </div>
</header>

<section class="hero">
  <h1>in a <span>nutshell</span></h1>
  <p>A curated collection of notes, canvases, and ideas from my Obsidian vault.</p>
</section>

<div class="controls">
  <div class="search-wrap">
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
         fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="search" id="search" placeholder="Search pages…" autocomplete="off">
  </div>
  <div class="tag-filters" id="tag-filters"></div>
</div>

<div class="grid" id="grid"></div>

<footer>
  built with <a href="https://obsidian.md" target="_blank" rel="noopener">Obsidian</a>
  &amp; <a href="https://pages.github.com" target="_blank" rel="noopener">GitHub Pages</a>
</footer>

<script>
  /* ─────────────────────────────────────────────────────────────
     PAGES — edit this array to add / remove published pages.

     Fields:
       title       required  display name
       url         required  path to the HTML file (relative to this index)
       description optional  short blurb shown on the card
       type        optional  "canvas" | "note" | "slides" | anything else
       tags        optional  array of strings
       date        optional  ISO date string "YYYY-MM-DD"
  ──────────────────────────────────────────────────────────────── */
  const PAGES = [
    {
      title:       "FCT PhD Call 2026",
      url:         "fct-phd-call-2026.html",
      description: "Overview of the FCT PhD call for 2026 — funding opportunities, deadlines, and requirements.",
      type:        "canvas",
      tags:        ["research", "phd"],
      date:        "2026-03-09",
    },
    /* Add more pages here — copy the block above and edit the fields */
  ];
  /* ─────────────────────────────────────────────────────────────── */

  /* ── Theme toggle ─────────────────────────────────────────────── */
  const html = document.documentElement;
  const btn  = document.getElementById("theme-toggle");
  const moon = document.getElementById("icon-moon");
  const sun  = document.getElementById("icon-sun");

  function setTheme(t) {
    html.dataset.theme = t;
    localStorage.setItem("theme", t);
    if (t === "dark") { moon.style.display = ""; sun.style.display = "none"; }
    else              { moon.style.display = "none"; sun.style.display = ""; }
  }
  setTheme(localStorage.getItem("theme") || "dark");
  btn.addEventListener("click", () =>
    setTheme(html.dataset.theme === "dark" ? "light" : "dark")
  );

  /* ── Collect all tags ─────────────────────────────────────────── */
  const allTags = [...new Set(PAGES.flatMap(p => p.tags || []))].sort();
  let activeTag = null;

  const tagContainer = document.getElementById("tag-filters");
  allTags.forEach(tag => {
    const b = document.createElement("button");
    b.className = "tag-btn";
    b.textContent = tag;
    b.addEventListener("click", () => {
      activeTag = activeTag === tag ? null : tag;
      document.querySelectorAll(".tag-btn").forEach(x => x.classList.remove("active"));
      if (activeTag) b.classList.add("active");
      render();
    });
    tagContainer.appendChild(b);
  });

  /* ── Render cards ─────────────────────────────────────────────── */
  const grid   = document.getElementById("grid");
  const search = document.getElementById("search");

  function formatDate(s) {
    if (!s) return "";
    const d = new Date(s + "T00:00:00");
    return d.toLocaleDateString("en-GB", { year: "numeric", month: "short", day: "numeric" });
  }

  function render() {
    const q = search.value.trim().toLowerCase();
    const filtered = PAGES.filter(p => {
      const text = (p.title + " " + (p.description || "") + " " + (p.tags || []).join(" ")).toLowerCase();
      const matchSearch = !q || text.includes(q);
      const matchTag    = !activeTag || (p.tags || []).includes(activeTag);
      return matchSearch && matchTag;
    });

    grid.innerHTML = "";
    if (filtered.length === 0) {
      grid.innerHTML = '<div class="no-results">No pages match your search.</div>';
      return;
    }
    filtered.forEach(p => {
      const type = (p.type || "note").toLowerCase();
      const a = document.createElement("a");
      a.className = "card";
      a.href = p.url;
      a.innerHTML = `
        <div class="card-type">
          <span class="card-type-dot ${type}"></span>
          ${type}
        </div>
        <h2>${p.title}</h2>
        ${p.description ? `<p>${p.description}</p>` : ""}
        <div class="card-footer">
          <div class="card-tags">
            ${(p.tags || []).map(t => `<span class="tag">${t}</span>`).join("")}
          </div>
          <span class="card-date">${formatDate(p.date)}</span>
        </div>
      `;
      grid.appendChild(a);
    });
  }

  search.addEventListener("input", render);
  render();
</script>
</body>
</html>
